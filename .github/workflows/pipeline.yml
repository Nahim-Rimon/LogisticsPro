name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Test & Lint Backend (FastAPI)
  # ─────────────────────────────────────────
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Create backend .env
        run: |
          cat > backend/.env << 'EOF'
          ${{ secrets.BACKEND_ENV }}
          EOF

      - name: Lint with flake8
        run: |
          pip install flake8
          cd backend
          flake8 . --max-line-length=120 --exclude=__pycache__,utils

      - name: Run backend tests
        run: |
          cd backend
          python -m pytest --ignore=utils || echo "No tests found, skipping"

  # ─────────────────────────────────────────
  # JOB 2: Build & Lint Frontend (Next.js)
  # ─────────────────────────────────────────
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Create frontend .env.local
        run: |
          cat > frontend/.env.local << 'EOF'
          ${{ secrets.FRONTEND_ENV }}
          EOF

      - name: Lint
        run: |
          cd frontend
          npm run lint

      - name: Build Next.js app
        run: |
          cd frontend
          npm run build

  # ─────────────────────────────────────────
  # JOB 3: Deploy Backend to VPS
  # ─────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend
    needs: backend-ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy FastAPI via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/yourproject/backend

            # Pull latest code
            git pull origin main

            # Write .env file on server
            cat > .env << 'EOF'
            ${{ secrets.BACKEND_ENV }}
            EOF

            # Install dependencies
            pip install -r requirements.txt

            # Restart FastAPI
            sudo systemctl restart fastapi
            # OR if using pm2:
            # pm2 restart fastapi-app

  # ─────────────────────────────────────────
  # JOB 4: Deploy Frontend to Vercel
  # ─────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    needs: frontend-ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create frontend .env.local
        run: |
          cat > frontend/.env.local << 'EOF'
          ${{ secrets.FRONTEND_ENV }}
          EOF

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: frontend
